<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily POS</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      font-family:Arial,sans-serif;
    }

    .loader{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:18px;
      background:#111;
      z-index:10;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
    }
  </style>
</head>
<body>

<div class="loader" id="loader">Loading POS...</div>

<iframe
  id="appFrame"
  src="https://script.google.com/macros/s/AKfycbxgtOZU_FV1xmf_uMKCYhi_reXNFV4n9dbyHg1SMjK3hx5w1zTGiqQY36jXoEFb8hZjog/exec"
  allow="clipboard-read; clipboard-write"
  onload="hideLoader()">
</iframe>

<script>
function hideLoader(){
  document.getElementById("loader").style.display="none";
}
</script>

</body>
</html>
